<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChirpGuard - Cyberbullying Protection</title>
  <style>
    body {
      width: 300px;
      height: 400px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.8;
    }

    .stats {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.8;
    }

    .stat-value {
      font-weight: bold;
    }

    .controls {
      margin-bottom: 20px;
    }

    .control-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: #10b981;
      color: white;
    }

    .btn-stop {
      background: #ef4444;
      color: white;
    }

    .btn-scan {
      background: #3b82f6;
      color: white;
    }

    .control-btn:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .control-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .settings {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .setting-label {
      font-size: 12px;
      opacity: 0.8;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #10b981;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .status {
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .status.active {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }

    .status.inactive {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .footer {
      text-align: center;
      font-size: 10px;
      opacity: 0.6;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🛡️ ChirpGuard</div>
    <div class="subtitle">Cyberbullying Protection</div>
  </div>

  <div id="status" class="status inactive">Monitoring Inactive</div>

  <div class="stats">
    <div class="stat-item">
      <span class="stat-label">Tweets Scanned</span>
      <span id="tweetsScanned" class="stat-value">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Threats Detected</span>
      <span id="threatsDetected" class="stat-value">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Actions Taken</span>
      <span id="actionsTaken" class="stat-value">0</span>
    </div>
  </div>

  <div class="controls">
    <button id="startBtn" class="control-btn btn-start">Start Monitoring</button>
    <button id="stopBtn" class="control-btn btn-stop" disabled>Stop Monitoring</button>
    <button id="scanBtn" class="control-btn btn-scan">Scan Current Page</button>
  </div>

  <div class="settings">
    <div class="setting-item">
      <span class="setting-label">Auto-hide Content</span>
      <label class="toggle">
        <input type="checkbox" id="autoHideToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-item">
      <span class="setting-label">Sound Alerts</span>
      <label class="toggle">
        <input type="checkbox" id="soundToggle">
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-item">
      <span class="setting-label">Desktop Notifications</span>
      <label class="toggle">
        <input type="checkbox" id="notificationToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="footer">
    Protect your timeline • Stay safe online
  </div>

  <script src="popup.js"></script>
</body>
</html>
